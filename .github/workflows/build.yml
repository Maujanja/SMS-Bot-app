name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-* -d android-sdk
          yes | android-sdk/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          android-sdk/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-34" "build-tools;34.0.0"
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        working-directory: android
        
      - uses: actions/upload-artifact@v4
        with:
          name: SMS-Bot-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
